		.header h1 { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: -1px; margin-bottom: 4px; }
		.header p { font-size: 13px; color: rgba(255,255,255,0.75); }
		
		.leyenda { background: #12121e; border-bottom: 1px solid #222; padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; }
		.badge { border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 700; }
		.badge-chv  { background: #e63329; color: #fff; }
		.badge-ds   { background: #0033a0; color: #fff; }
		.badge-dis  { background: #113ccf; color: #fff; }
		.leyenda-note { color: #888; font-size: 12px; }
		
		/* TABS ESTADO */
		.tabs { background: #12121e; padding: 10px 16px; display: flex; gap: 8px; border-bottom: 1px solid #1e1e2e; }
		.tab { padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; border: 2px solid transparent; transition: all .2s; color: #888; background: #1e1e30; }
		.tab:hover { color: #ccc; }
		.tab.active-todos    { background: #2a2a40; color: #fff; border-color: #555; }
		.tab.active-proximos { background: #1a3a1a; color: #4caf50; border-color: #4caf50; }
		.tab.active-jugados  { background: #2a1a1a; color: #f0c040; border-color: #f0c040; }
		
		.filtros { background: #12121e; padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid #1e1e2e; }
		.filtros input, .filtros select {
			padding: 8px 12px; border-radius: 8px; background: #1e1e30; color: #fff;
			border: 1px solid #333; font-size: 13px; outline: none;
		}
		.filtros input { flex: 1; min-width: 160px; }
		
		.contador { text-align: center; padding: 8px; background: #0e0e1a; font-size: 12px; color: #666; }
		
		.lista { padding: 12px 12px 60px; }
		.fecha-grupo { margin-bottom: 16px; }
		.fecha-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
		.fase-pill { border-radius: 20px; padding: 3px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
		.fecha-label { font-size: 13px; font-weight: 700; color: #bbb; text-transform: capitalize; }
		.fecha-line { flex: 1; height: 1px; background: #222; }
		
		.card {
			background: #16162a; border: 1px solid #222; border-radius: 12px;
			padding: 12px 14px; margin-bottom: 8px;
			border-left-width: 4px; border-left-style: solid;
			transition: opacity .2s;
		}
		.card.jugado { background: #111120; opacity: 0.85; }
		
		.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
		.card-hora { font-size: 13px; font-weight: 800; color: #f0c040; }
		.card-hora.finalizado { color: #888; text-decoration: line-through; }
		.card-grupo { font-size: 11px; color: #888; background: #222; border-radius: 6px; padding: 2px 8px; }
		
		/* MARCADOR */
		.card-partido-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
		.card-equipo { font-size: 15px; font-weight: 800; color: #fff; flex: 1; }
		.card-equipo.ganador { color: #4caf50; }
		.card-equipo.perdedor { color: #888; font-weight: 600; }
		.card-marcador {
			display: flex; align-items: center; gap: 6px;
			background: #0e0e1a; border-radius: 8px; padding: 4px 10px;
			font-size: 18px; font-weight: 900; letter-spacing: 2px; color: #fff;
			min-width: 70px; justify-content: center;
		}
		.card-marcador.pendiente { color: #444; font-size: 14px; font-weight: 400; letter-spacing: 1px; }
		.card-marcador span { font-size: 13px; color: #555; }
		
		/* ESTADO BADGE */
		.estado-badge { font-size: 10px; font-weight: 700; border-radius: 10px; padding: 2px 8px; text-transform: uppercase; letter-spacing: 1px; }
		.estado-ft   { background: #2a1a00; color: #f0c040; }
		.estado-live { background: #1a3a1a; color: #4caf50; animation: pulse 1s infinite; }
		.estado-prox { background: #1a1a2e; color: #555; }
		@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
		
		.card-sede { font-size: 12px; color: #777; margin-bottom: 8px; margin-top: 4px; }
		.card-canales { display: flex; flex-wrap: wrap; gap: 5px; }
		.card-canales .badge { font-size: 11px; padding: 3px 10px; }
		
		.empty { text-align: center; padding: 40px; color: #555; }
		footer { text-align: center; padding: 16px; background: #0a0a12; color: #444; font-size: 11px; border-top: 1px solid #1a1a2e; }

		// ─── ESTADO ──────────────────────────────────────────────────────────────────
		let tabActivo = "todos";
		
		function setTab(tab) {
			tabActivo = tab;
			["todos","proximos","jugados"].forEach(t => {
				const el = document.getElementById("tab-"+t);
				el.className = "tab" + (t === tab ? " active-"+t : "");
			});
			render();
		}
		
		// ─── RENDER ──────────────────────────────────────────────────────────────────
		function render() {
			const q     = document.getElementById("busqueda").value.toLowerCase();
			const canal = document.getElementById("filtroCanal").value;
			const fase  = document.getElementById("filtroFase").value;
			
			const filtrados = partidos.filter(p => {
				const esJugado  = p.estado === "ft";
				const esPendiente = p.estado !== "ft";
				if (tabActivo === "jugados"  && !esJugado)   return false;
				if (tabActivo === "proximos" && !esPendiente) return false;
				const mCanal = canal === "Todos" || p.canales.includes(canal);
				const mFase  = fase  === "Todos" || p.fase === fase;
				const mQ     = !q || p.local.toLowerCase().includes(q) || p.visita.toLowerCase().includes(q) || p.sede.toLowerCase().includes(q);
				return mCanal && mFase && mQ;
			});
			
			document.getElementById("contador").textContent =
			`Mostrando ${filtrados.length} partido${filtrados.length !== 1 ? "s" : ""}`;
			
			const grupos = {};
			for (const p of filtrados) {
				if (!grupos[p.fecha]) grupos[p.fecha] = [];
				grupos[p.fecha].push(p);
			}
			const fechas = Object.keys(grupos).sort();
			
			const lista = document.getElementById("lista");
			if (fechas.length === 0) {
				lista.innerHTML = `<div class="empty">No hay partidos con esos filtros.</div>`;
				return;
			}
			
			lista.innerHTML = fechas.map(f => {
				const ps  = grupos[f];
				const fc  = FASE_COL[ps[0].fase] || "#333";
				
				const cards = ps.map(p => {
					const jugado = p.estado === "ft";
					const live   = p.estado === "live";
					const res    = p.resultado;
					
					// Determinar ganador
					let claseLocal = "", claseVisita = "";
					if (jugado && res) {
						if (res[0] > res[1])      { claseLocal = "ganador"; claseVisita = "perdedor"; }
						else if (res[0] < res[1]) { claseLocal = "perdedor"; claseVisita = "ganador"; }
					}
					
					// Marcador
					let marcador = "";
					if (res) {
						marcador = `<div class="card-marcador">${res[0]} <span>-</span> ${res[1]}</div>`;
					} else {
						marcador = `<div class="card-marcador pendiente">vs</div>`;
					}
					
					// Estado badge
					let estadoBadge = "";
					if (jugado)    estadoBadge = `<span class="estado-badge estado-ft">Finalizado</span>`;
					else if (live) estadoBadge = `<span class="estado-badge estado-live">● En vivo</span>`;
					
					// Hora
					const horaClass = jugado ? "card-hora finalizado" : "card-hora";
					const horaLabel = p.hora !== "TBD" ? `🕐 ${p.hora} hrs` : "🕐 Hora por definir";
					
					const canalesBadges = p.canales.map(c => {
						const info = CANALES[c] || {};
						return `<span class="badge" style="background:${info.bg};color:${info.text}">${info.label||c}</span>`;
					}).join("");
					
					return `
					<div class="card${jugado?" jugado":""}" style="border-left-color:${FASE_COL[p.fase]||'#444'}">
						<div class="card-top">
							<span class="${horaClass}">${horaLabel}</span>
							<div style="display:flex;gap:6px;align-items:center">
							${estadoBadge}
							${p.grupo !== "-" ? `<span class="card-grupo">Grupo ${p.grupo}</span>` : ""}
							</div>
						</div>
						<div class="card-partido-row">
							<div class="card-equipo ${claseLocal}">${p.local}</div>
							${marcador}
							<div class="card-equipo ${claseVisita}" style="text-align:right">${p.visita}</div>
						</div>
						<div class="card-sede">📍 ${p.sede}</div>
						<div class="card-canales">${canalesBadges}</div>
					</div>`;
				}).join("");
				
				return `
				<div class="fecha-grupo">
				<div class="fecha-header">
					<span class="fase-pill" style="background:${fc}">${ps[0].fase}</span>
					<span class="fecha-label">${fmtFecha(f)}</span>
					<div class="fecha-line"></div>
				</div>
				${cards}
				</div>`;
			}).join("");
		}
		
		render();
	</script>
